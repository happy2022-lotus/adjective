        .alphabet-btn:hover {

        const placeholder = document.getElementById('placeholder');
        const letterDisplay = document.getElementById('selected-letter');

        // 알파벳 버튼 생성
        Object.keys(adjectivesData).forEach(letter => {
            const btn = document.createElement('button');
            btn.textContent = letter;
            btn.className = 'alphabet-btn h-12 w-full flex items-center justify-center rounded-lg bg-white border border-slate-200 text-lg font-bold text-slate-700';
            btn.onclick = () => showAdjectives(letter, btn);
            grid.appendChild(btn);
        });

        function showAdjectives(letter, btn) {
            // 버튼 활성화 스타일 처리
            document.querySelectorAll('.alphabet-btn').forEach(b => b.classList.remove('active-letter'));
            btn.classList.add('active-letter');

            // 내용 업데이트
            placeholder.classList.add('hidden');
            container.classList.remove('hidden');
            letterDisplay.textContent = letter;
            
            list.innerHTML = '';
            adjectivesData[letter].forEach(item => {
                const card = document.createElement('div');
                card.className = 'flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100 hover:bg-blue-50 hover:border-blue-100 transition-colors cursor-default';
                card.innerHTML = `
                    <span class="text-lg font-bold text-slate-800">${item.word}</span>
                    <span class="text-sm text-blue-600 font-medium">${item.mean}</span>
                `;
                list.appendChild(card);
            });

            // 부드럽게 스크롤
            container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
